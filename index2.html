<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Club de Box Elite</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* ===== NAV ===== */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav-inner {
  max-width: 1100px;
  margin: auto;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo { font-weight: bold; }

.nav-links {
  display: flex;
  align-items: center;
  gap: 14px;
}

.nav-links a {
  color: white;
  text-decoration: none;
  font-size: 14px;
  opacity: 0.85;
}

.nav-links a:hover { opacity: 1; }

.icon-btn {
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
}

.menu-btn {
  display: none;
  font-size: 22px;
  cursor: pointer;
}

@media (max-width:768px) {
  .menu-btn { display:block; }

  .nav-links {
    display:none;
    position:absolute;
    top:60px;
    left:0;
    right:0;
    flex-direction:column;
    background: rgba(0,0,0,0.95);
    padding:15px;
  }

  .nav-links.active { display:flex; }
}

/* ===== HERO ===== */
header {
  height: 45vh;
  margin-top: 65px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  text-align:center;
}

header img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.4;
}

/* ===== SECTIONS ===== */
section {
  padding: 55px 20px;
  text-align:center;
}

.dark { background:#1a1a1a; }

/* ===== CARDS ===== */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

.card {
  min-height:220px;
  border-radius:12px;
  background-size:cover;
  background-position:center;
  position:relative;
  cursor:pointer;
}

.card::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

.card h3 {
  position:relative;
  margin-top:90px;
}

.info-box {
  max-width:800px;
  margin:25px auto 0;
  padding:18px;
  background:#111;
  border-radius:12px;
}

/* ===== GALLERY ===== */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  max-width:1000px;
  margin:auto;
}

.gallery img {
  width:100%;
  border-radius:12px;
}

/* ===== VIDEO ===== */
.video-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  max-width:1000px;
  margin:auto;
}

iframe {
  width:100%;
  height:220px;
  border-radius:12px;
  border:none;
}

/* ===== FOOTER (UPDATED WITH MAP BUTTON) ===== */
footer {
  text-align:center;
  padding:20px 12px;
  font-size:13px;
  background:#0b0b0b;
  color:#aaa;
}

.map-btn {
  margin-top:10px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:white;
  text-decoration:none;
}

.map-btn:hover {
  background:rgba(255,255,255,0.15);
}

/* ===== WHATSAPP ===== */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:14px;
  border-radius:50%;
  color:white;
  font-size:24px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">

    <div class="logo">🥊 BOX ELITE</div>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div class="nav-links" id="menu">
      <a href="#despre">Despre</a>
      <a href="#antrenamente">Antrenamente</a>
      <a href="#contact">Contact</a>

      <a class="icon-btn"><i class="fa-brands fa-instagram"></i></a>
      <a class="icon-btn"><i class="fa-brands fa-facebook"></i></a>
      <a class="icon-btn"><i class="fa-brands fa-tiktok"></i></a>
    </div>
  </div>
</div>

<!-- HERO -->
<header>
  <img src="img/hero.jpg">
  <h1>Club de Box Elite</h1>
</header>

<!-- DESPRE -->
<section id="despre">
  <h2>Despre noi</h2>
  <p>Antrenamente profesionale de box.</p>
</section>

<!-- ANTRENAMENTE -->
<section id="antrenamente" class="dark">
  <h2>Antrenamente</h2>

  <div class="grid">
    <div class="card" style="background-image:url('img/beginner.jpg')" onclick="showInfo('beginner')">
      <h3>Începători</h3>
    </div>

    <div class="card" style="background-image:url('img/intermediate.jpg')" onclick="showInfo('intermediate')">
      <h3>Intermediar</h3>
    </div>

    <div class="card" style="background-image:url('img/advanced.jpg')" onclick="showInfo('advanced')">
      <h3>Avansați</h3>
    </div>
  </div>

  <div class="info-box" id="infoBox">Apasă pe un nivel.</div>
</section>

<!-- VIDEO -->
<section>
  <h2>Video</h2>
  <div class="video-grid">
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
  </div>
</section>

<!-- GALERIE -->
<section class="dark">
  <h2>Galerie</h2>
  <div class="gallery">
    <img src="img/gallery1.jpg">
    <img src="img/gallery2.jpg">
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>📍 Baia Mare, România</p>
    <a class="map-btn"
     href="https://www.google.com/maps?q=Baia+Mare"
     target="_blank">
    <i class="fa-solid fa-location-dot"></i>
    Vezi locația pe hartă
  </a>
  <p>📞 +40 XXX XXX XXX</p>
</section>

<!-- FOOTER (MAP BUTTON HERE NOW) -->
<footer>
  <div>© 2026 Club de Box Elite</div>


</footer>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/40700000000">
  <i class="fa-brands fa-whatsapp"></i>
</a>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

function showInfo(type){
  const data = {
    beginner:"Bază tehnică și gardă.",
    intermediate:"Combinații și sparring.",
    advanced:"Nivel competițional."
  };
  document.getElementById("infoBox").innerText = data[type];
}
</script>

</body>
</html>
