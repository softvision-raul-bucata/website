<!DOCTYPE html>
<html lang="ro">

<body>

<!-- NAV -->

    </div>

<!-- HERO -->

    <img src="img/gallery1.jpg" alt="">

</section>

<!-- CONTACT -->

  <a class="map-btn" href="https://www.google.com/maps?q=Baia+Mare" target="_blank">

    Vezi locația pe hartă
  </a>

  <p>📞 +40 XXX XXX XXX</p>

<!-- FOOTER -->
<footer>
  © 2026 Club de Box Elite
</footer>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/40700000000">

</a>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>
